# Full production stack — one command, restart-on-boot.
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes: ["mongodata:/data/db"]
    # MongoDB auth: set credentials and put them in MONGODB_URI
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes: ["redisdata:/data"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: ["miniodata:/data"]

  api:
    build: { context: ./apps/api }
    image: crackers-api:latest
    restart: unless-stopped
    env_file: .env
    depends_on: [mongo, redis]

  worker:
    image: crackers-api:latest
    restart: unless-stopped
    env_file: .env
    command: ["node", "src/queue/worker.js"]
    depends_on: [api, redis]

  storefront:
    build: { context: ., dockerfile: Dockerfile.web, args: { APP: storefront, VITE_API_URL: "${VITE_API_URL}" } }
    restart: unless-stopped
    depends_on: [api]

  admin:
    build: { context: ., dockerfile: Dockerfile.web, args: { APP: admin, VITE_API_URL: "${VITE_API_URL}" } }
    restart: unless-stopped
    depends_on: [api]

  crm:
    build: { context: ., dockerfile: Dockerfile.web, args: { APP: crm, VITE_API_URL: "${VITE_API_URL}" } }
    restart: unless-stopped
    depends_on: [api]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on: [api, storefront, admin, crm]

volumes:
  mongodata:
  redisdata:
  miniodata:
  certbot_webroot:
