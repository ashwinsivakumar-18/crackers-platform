# Edge nginx — TLS termination + routing to the containers. Replace yourstore.in.
# Certs issued on the host with certbot and mounted at /etc/letsencrypt (see DEPLOY.md).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

server {
  listen 80;
  server_name yourstore.in www.yourstore.in admin.yourstore.in crm.yourstore.in api.yourstore.in;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# API
server {
  listen 443 ssl; http2 on; server_name api.yourstore.in;
  ssl_certificate /etc/letsencrypt/live/yourstore.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourstore.in/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  client_max_body_size 12m;
  location / {
    limit_req zone=api_limit burst=40 nodelay;
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Storefront / Admin / CRM (static SPAs)
server { listen 443 ssl; http2 on; server_name yourstore.in www.yourstore.in;
  ssl_certificate /etc/letsencrypt/live/yourstore.in/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/yourstore.in/privkey.pem;
  location / { proxy_pass http://storefront:80; proxy_set_header Host $host; } }
server { listen 443 ssl; http2 on; server_name admin.yourstore.in;
  ssl_certificate /etc/letsencrypt/live/yourstore.in/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/yourstore.in/privkey.pem;
  add_header X-Frame-Options DENY always;
  location / { proxy_pass http://admin:80; proxy_set_header Host $host; } }
server { listen 443 ssl; http2 on; server_name crm.yourstore.in;
  ssl_certificate /etc/letsencrypt/live/yourstore.in/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/yourstore.in/privkey.pem;
  add_header X-Frame-Options DENY always;
  location / { proxy_pass http://crm:80; proxy_set_header Host $host; } }
