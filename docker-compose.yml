# Local data stores for development. Run: docker compose up -d
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
volumes:
  mongodata:
  redisdata:
